<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kitozon</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #059669;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    .splash-container {
      text-align: center;
      color: #ffffff;
    }
    .splash-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 24px;
      letter-spacing: -1px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }
    .splash-title {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .splash-subtitle {
      font-size: 16px;
      font-weight: 400;
      opacity: 0.85;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="splash-logo">K</div>
    <h1 class="splash-title">Kitozon</h1>
    <p class="splash-subtitle">Sustainable Container Homes</p>
  </div>
</body>
</html>
