<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A56DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A56DB;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Subtle background circle -->
  <circle cx="80" cy="80" r="78" fill="#F0F5FF" />
  <!--
    Icon Mark: Abstract geometric "F" that reads as a person in motion.
    Two interlocking bands form a dynamic swooping mark.
  -->
  <!-- Vertical pillar (blue) - forms the backbone of the F and a figure's stance -->
  <path d="M 50 130 Q 48 100 50 55 Q 52 35 55 30"
        fill="none" stroke="url(#tealGrad)" stroke-width="16" stroke-linecap="round"/>
  <!-- Top horizontal bar (blue) - the top of the F and an outstretched arm -->
  <path d="M 55 30 Q 80 25 100 35"
        fill="none" stroke="url(#orangeGrad)" stroke-width="13" stroke-linecap="round"/>
  <!-- Middle bar (blue) - middle of the F, suggesting a bent arm/waist -->
  <path d="M 52 75 Q 70 70 85 78 Q 95 82 100 75"
        fill="none" stroke="url(#tealGrad)" stroke-width="12" stroke-linecap="round"/>
  <!-- Dynamic lower curve (blue) - suggests a leg in motion -->
  <path d="M 50 115 Q 65 135 85 140 Q 105 142 110 130"
        fill="none" stroke="url(#orangeGrad)" stroke-width="10" stroke-linecap="round"/>
  <!-- Energy accent dots -->
  <circle cx="100" cy="35" r="5" fill="#3B82F6" opacity="0.9"/>
  <circle cx="110" cy="130" r="4" fill="#1A56DB" opacity="0.8"/>
  <circle cx="45" cy="50" r="3.5" fill="#1E40AF" opacity="0.6"/>
</svg>
