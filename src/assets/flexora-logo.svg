<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A56DB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A56DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A56DB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A56DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icon Mark: Abstract figure in dynamic stretching pose, forming a subtle "F" -->
  <g transform="translate(30, 10)">
    <!-- Background circle (subtle blue glow) -->
    <circle cx="65" cy="80" r="60" fill="#F0F5FF" />
    <!-- Main figure mark: stylized person stretching/reaching -->
    <!-- Torso/body arc (blue) -->
    <path d="M 50 120 Q 45 90 55 60 Q 65 30 85 25"
          fill="none" stroke="url(#tealGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arm reaching up/out (blue gradient) -->
    <path d="M 55 60 Q 40 45 25 30"
          fill="none" stroke="url(#orangeGrad)" stroke-width="12" stroke-linecap="round"/>
    <!-- Dynamic forward arm (blue) -->
    <path d="M 55 60 Q 75 50 95 40"
          fill="none" stroke="url(#tealGrad)" stroke-width="10" stroke-linecap="round"/>
    <!-- Leg/lower body (blue) -->
    <path d="M 50 120 Q 60 135 80 140 Q 100 142 110 135"
          fill="none" stroke="url(#orangeGrad)" stroke-width="10" stroke-linecap="round"/>
    <!-- Energy dot / accent -->
    <circle cx="25" cy="30" r="5" fill="#3B82F6"/>
    <circle cx="95" cy="40" r="4" fill="#1A56DB"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(170, 0)">
    <!-- FLEXORA -->
    <text x="0" y="100" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="60"
          font-weight="800" letter-spacing="2" fill="url(#textGrad)">
      FLEXORA
    </text>
    <!-- FITNES -->
    <text x="0" y="140" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="36"
          font-weight="300" letter-spacing="10" fill="#3B82F6">
      FITNES
    </text>
    <!-- Subtle blue accent bar under the wordmark -->
    <rect x="0" y="152" width="280" height="3" rx="1.5" fill="url(#orangeGrad)" opacity="0.8"/>
  </g>
</svg>
