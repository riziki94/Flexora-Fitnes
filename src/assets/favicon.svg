<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A56DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A56DB;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="1" y="1" width="30" height="30" rx="6" ry="6" fill="url(#bg)" />
  <!-- Simplified F-mark: vertical bar (white) -->
  <rect x="8" y="6" width="4" height="20" rx="2" fill="white" />
  <!-- Top bar (blue) -->
  <rect x="12" y="6" width="12" height="4" rx="2" fill="url(#orangeGrad)" />
  <!-- Middle bar (white) -->
  <rect x="12" y="14" width="10" height="3.5" rx="1.75" fill="white" opacity="0.9" />
</svg>
